# Inference service configuration.
# Any value can be overridden at runtime by an environment variable:
#   onnx.model.path  <- ONNX_MODEL_PATH
#   feast.base.url   <- FEAST_BASE_URL

# Path to the ONNX model binary used for scoring.
onnx.model.path=./model.onnx

# Base URL of the Feast online feature server (the feast docker container).
# When running this service inside the same docker network, use http://feast:6566
feast.base.url=http://localhost:6566
